<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #f3f4f6;
      --card: #ffffff;
      --ink-900: #1f2937;
      --ink-700: #374151;
      --ink-500: #6b7280;
      --line: #d1d5db;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-full: 9999px;
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --track-a: #f5b83d;
      --track-b: #7fc542;
      --track-c: #43c8b8;
      --track-d: #48a7dc;
      --track-e: #3f7de2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--ink-900);
      min-height: 100vh;
      line-height: 1.45;
    }

    .app-header {
      background: #111827;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-full);
      padding: 6px 13px;
      text-decoration: none;
    }
    .header-title {
      color: #f9fafb;
      font-size: 18px;
      font-weight: 600;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .page {
      max-width: 500px;
      margin: 0 auto;
      padding: 14px 12px 24px;
    }

    .score-summary {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius-lg);
      padding: 14px 10px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 30px rgba(17, 24, 39, 0.06);
    }
    .score-cell { text-align: center; }
    .score-label {
      font-size: 10px;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--ink-500);
      margin-bottom: 4px;
      font-weight: 700;
    }
    .score-value {
      font-size: 34px;
      font-weight: 700;
      color: var(--ink-900);
    }
    .score-arrow {
      color: #06b6d4;
      font-size: 22px;
      font-weight: 700;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .score-delta {
      margin-top: 2px;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--ink-700);
      text-align: center;
      font-weight: 600;
    }

    .timeline-wrap {
      position: relative;
      padding-top: 6px;
      padding-bottom: 10px;
      max-height: calc(100vh - 240px);
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
      min-height: 560px;
    }
    .timeline-wrap::-webkit-scrollbar { width: 6px; }
    .timeline-wrap::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: var(--radius-full);
    }
    .path-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .journey-path {
      fill: none;
      stroke: url(#trackGradient);
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 2200;
      stroke-dashoffset: 2200;
      animation: draw 2.4s ease forwards;
    }

    .phase-list {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 24px;
    }
    .phase-row {
      display: flex;
      min-height: 170px;
    }
    .phase-row.left .phase-card { margin-left: auto; }
    .phase-row.right .phase-card { margin-right: auto; }

    .phase-card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius-md);
      padding: 12px 10px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      transform: translateY(12px);
      opacity: 0;
      animation: reveal 420ms ease forwards;
      min-height: 156px;
      width: min(252px, 62vw);
    }
    .phase-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 2px;
    }
    .phase-id {
      font-size: 10px;
      color: var(--ink-500);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .phase-points {
      font-size: 11px;
      color: #0f766e;
      font-weight: 700;
    }
    .phase-title {
      font-size: 17px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .phase-type {
      display: inline-block;
      font-size: 10px;
      color: #4b5563;
      border: 1px solid #d1d5db;
      border-radius: var(--radius-full);
      padding: 2px 8px;
      margin-bottom: 6px;
      font-weight: 600;
      background: #f9fafb;
    }
    .phase-note {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 8px;
      font-size: 11px;
      color: #4b5563;
      min-height: 72px;
      line-height: 1.45;
    }
    .phase-note strong {
      color: #1f2937;
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.14); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="back-btn" href="improve.html">← Back</a>
    <span class="header-title">Score Journey</span>
  </header>

  <div class="page">
    <div class="score-summary">
      <div class="score-cell">
        <div class="score-label">Current Score</div>
        <div class="score-value" id="currentScore">0.0</div>
      </div>
      <div class="score-arrow">→</div>
      <div class="score-cell">
        <div class="score-label">Target Score</div>
        <div class="score-value" id="targetScore">0.0</div>
      </div>
    </div>
    <div class="score-delta" id="deltaText">+0.0 projected improvement</div>

    <div class="timeline-wrap">
      <svg class="path-svg" viewBox="0 0 420 960" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="trackGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--track-a)" />
            <stop offset="25%" stop-color="var(--track-b)" />
            <stop offset="50%" stop-color="var(--track-c)" />
            <stop offset="75%" stop-color="var(--track-d)" />
            <stop offset="100%" stop-color="var(--track-e)" />
          </linearGradient>
        </defs>
        <path class="journey-path" d="M210 48 C340 96, 340 176, 210 228 C80 280, 80 360, 210 412 C340 464, 340 544, 210 596 C80 648, 80 728, 210 780 C340 832, 340 912, 210 948" />
      </svg>
      <div class="phase-list" id="phaseList"></div>
    </div>
  </div>

  <script>
    function getInferenceColor(score) {
      if (score > 85) return '#8DE28D';
      if (score > 75) return '#71F0FF';
      if (score > 65) return '#F4C764';
      if (score > 50) return '#FB923C';
      return '#F87171';
    }

    function loadPayload() {
      try {
        return JSON.parse(localStorage.getItem('dh_journey_payload') || '{}');
      } catch (e) {
        return {};
      }
    }

    function init() {
      const payload = loadPayload();
      const current = Number(payload.currentScore || 0);
      const target = Number(payload.targetScore || current);
      const actions = Array.isArray(payload.actions) ? payload.actions : [];

      const currentEl = document.getElementById('currentScore');
      const targetEl = document.getElementById('targetScore');
      currentEl.textContent = current.toFixed(1);
      targetEl.textContent = target.toFixed(1);
      currentEl.style.color = getInferenceColor(current);
      targetEl.style.color = getInferenceColor(target);
      document.getElementById('deltaText').textContent =
        `${(target - current >= 0 ? '+' : '') + (target - current).toFixed(1)} projected improvement`;

      const list = document.getElementById('phaseList');
      if (!actions.length) {
        list.innerHTML = '<div class="phase-card"><div class="phase-title">No selected actions</div><div class="phase-note"><strong>Recommendation</strong>Go back and choose actions to build your score journey.</div></div>';
        return;
      }

      list.innerHTML = actions.map((action, idx) => {
        const isLeft = idx % 2 === 0;
        const delay = idx * 150;
        const rec = action.recommendation || 'Follow this action consistently to improve your score.';
        return `
        <div class="phase-row ${isLeft ? 'left' : 'right'}">
          <div class="phase-card" style="animation-delay:${delay + 60}ms">
            <div class="phase-head">
              <div class="phase-id">Phase ${String(idx + 1).padStart(2, '0')}</div>
              <div class="phase-points">+${Number(action.points || 0).toFixed(1)} pts</div>
            </div>
            <div class="phase-title">${action.label || 'Action'}</div>
            <div class="phase-type">${action.type || 'Action'}</div>
            <div class="phase-note"><strong>Recommendation</strong>${rec}</div>
          </div>
        </div>
      `; }).join('');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
